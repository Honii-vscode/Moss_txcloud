<!DOCTYPE html>
<html>
<head>
    <title>v2版本测试</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .success { color: green; }
        .error { color: red; }
        .data { margin-top: 20px; }
        .item { border: 1px solid #ccc; padding: 10px; margin: 5px 0; }
        .positive { color: green; }
        .negative { color: red; }
    </style>
</head>
<body>
    <h1>v2版本金融看板测试</h1>
    <div id="status">测试中...</div>
    <div id="links">
        <h3>重要链接：</h3>
        <ul>
            <li><a href="http://43.156.96.119:3001/" target="_blank">主页面</a></li>
            <li><a href="http://43.156.96.119:3001/api/market-data" target="_blank">API数据</a></li>
            <li><a href="http://43.156.96.119:3001/api/health" target="_blank">健康检查</a></li>
        </ul>
    </div>
    <div id="data" class="data"></div>
    
    <script>
        async function testDashboard() {
            const statusDiv = document.getElementById('status');
            const dataDiv = document.getElementById('data');
            
            try {
                // 测试API
                statusDiv.innerHTML = '正在连接API...';
                const response = await fetch('http://43.156.96.119:3001/api/market-data');
                
                if (!response.ok) {
                    throw new Error(`HTTP错误: ${response.status}`);
                }
                
                const result = await response.json();
                
                // 显示结果
                if (result.success) {
                    statusDiv.innerHTML = `<span class="success">✅ v2版本连接成功！</span>`;
                    statusDiv.innerHTML += `<br>消息: ${result.message}`;
                    statusDiv.innerHTML += `<br>最后更新: ${new Date(result.lastUpdate).toLocaleString('zh-CN')}`;
                    statusDiv.innerHTML += `<br>数据条数: ${result.count}`;
                    
                    // 显示数据
                    let html = '<h2>市场数据 (键值对格式):</h2>';
                    Object.keys(result.data).forEach(key => {
                        const item = result.data[key];
                        if (item) {
                            const changeClass = item.change >= 0 ? 'positive' : 'negative';
                            const changeSign = item.change >= 0 ? '↑' : '↓';
                            html += `
                                <div class="item">
                                    <strong>${item.name || key}</strong> (${item.symbol || 'N/A'})<br>
                                    价格: ${item.price ? item.price.toFixed(2) : 'N/A'}<br>
                                    <span class="${changeClass}">
                                        ${changeSign} ${item.change ? Math.abs(item.change).toFixed(2) : '0.00'} 
                                        (${item.changePercent ? (item.changePercent >= 0 ? '+' : '') + item.changePercent.toFixed(2) + '%' : '0.00%'})
                                    </span><br>
                                    时间: ${item.timestamp ? new Date(item.timestamp).toLocaleString('zh-CN') : 'N/A'}
                                </div>
                            `;
                        }
                    });
                    dataDiv.innerHTML = html;
                } else {
                    statusDiv.innerHTML = `<span class="error">❌ API返回失败</span><br>错误: ${result.error}`;
                }
            } catch (error) {
                statusDiv.innerHTML = `<span class="error">❌ 测试失败</span><br>错误: ${error.message}`;
                console.error('测试错误:', error);
            }
        }
        
        testDashboard();
    </script>
</body>
</html>
